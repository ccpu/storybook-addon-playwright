name: CI

on:
  push:
    branches:
      - master
      - next
  pull_request:
    branches:
      - master
      - next
  workflow_call:

jobs:
  ci:
    runs-on: ubuntu-latest
    name: JavaScript Tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup project
        uses: ./.github/actions/setup-project

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test
        env:
          CI: true

      # The MCP server (mcp/) is a self-contained package with its own config.
      # Its deps are already present at the repo root, so it runs without a
      # separate install. The schema-sync test here fails the build if the MCP
      # action catalog drifts from the addon's generated action schema.
      - name: MCP server checks
        run: |
          pnpm exec tsc --noEmit -p mcp/tsconfig.json
          pnpm exec vitest run --config mcp/vitest.config.ts
        env:
          CI: true
